<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="storm-orange-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#ea580c" flood-opacity="0.8" />
    </filter>
  </defs>
  
  <rect x="60" y="60" width="280" height="280" rx="70" fill="url(#storm-orange-gradient)" filter="url(#shadow)" />
  
  <!-- Background Lightning Bolt -->
  <path d="M230 110 L150 220 L200 220 L160 290 L250 170 L200 170 Z" fill="#ffffff" opacity="0.4" />
  
  <!-- Typography -->
  <text 
    x="200" 
    y="205" 
    font-family="'Arial Black', system-ui, sans-serif" 
    font-size="64" 
    font-weight="900" 
    text-anchor="middle" 
    fill="#ffffff"
    letter-spacing="2"
  >
    STORM
  </text>
  
  <text 
    x="200" 
    y="250" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="28" 
    font-weight="800" 
    text-anchor="middle" 
    fill="#ffffff"
    letter-spacing="2"
  >
    MUHASEBE
  </text>
</svg>
