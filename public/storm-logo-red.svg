<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Perfect flat modern red background with smooth squircle shape -->
  <rect x="15" y="15" width="370" height="370" rx="96" fill="#dc2626" />
  
  <!-- Minimalist Modern Lightning Brand Icon -->
  <g transform="translate(145, 65)">
    <path d="M55 5 L15 75 L45 75 L30 130 L85 55 L55 55 Z" fill="#ffffff" />
  </g>
  
  <!-- Beautiful Premium Modern Typography -->
  <!-- "STORM" - Elegant, wide, bold, sans-serif -->
  <text 
    x="200" 
    y="265" 
    font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" 
    font-size="46" 
    font-weight="900" 
    text-anchor="middle" 
    fill="#ffffff"
    letter-spacing="8"
  >STORM</text>
  
  <!-- "MUHASEBE" - Light, extremely clean, highly legible and spaced -->
  <text 
    x="200" 
    y="312" 
    font-family="system-ui, -apple-system, 'SF Pro Text', sans-serif" 
    font-size="18" 
    font-weight="800" 
    text-anchor="middle" 
    fill="#ffffff"
    opacity="0.9"
    letter-spacing="5"
  >MUHASEBE</text>
</svg>
